name: Knowledge Base Ingest

on:
  push:
    branches: ["main"]
    paths:
      - "knowledge-base/**"
      - ".github/workflows/kb-ingest.yml"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload all KB files
        run: |
          shopt -s nullglob
          for f in knowledge-base/*; do
            echo "Uploading $f"
            curl -X POST "${{ secrets.BACKEND_KB_UPLOAD_URL }}" \
              -H "Authorization: Bearer ${{ secrets.KB_INGEST_TOKEN }}" \
              -F "file=@${f}"
          done
